<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2D Physics Engine Test</title>
</head>
<body>
    <h1>Симуляция запущена</h1>
    <p>Открой консоль разработчика (F12), чтобы увидеть поток данных!</p>

    <script>
        // Подключаемся к нашему Go серверу
        const ws = new WebSocket("ws://localhost:8080/ws");

        ws.onopen = () => {
            console.log("Успешное подключение к серверу симуляции!");
        };

        ws.onmessage = (event) => {
            // Парсим JSON, который пришел от Go (твой []RenderState)
            const objects = JSON.parse(event.data);
            
            // Выводим данные в консоль (здесь позже будет отрисовка на Canvas)
            console.log("Кадр:", objects);
        };

        ws.onclose = () => {
            console.log("Соединение закрыто");
        };

        ws.onerror = (error) => {
            console.error("Ошибка WebSocket:", error);
        };
    </script>
</body>
</html>
